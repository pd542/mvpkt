name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags-ignore:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # release is debug-signed in build.gradle.kts → installable APKs
      - name: Build with Gradle
        run: ./gradlew --no-daemon detekt assembleRelease

      - name: List APK outputs
        run: find app/build/outputs/apk -type f -name '*.apk' -ls

      - name: Upload arm64-v8a (signed)
        uses: actions/upload-artifact@v4
        with:
          name: mpvKt-arm64-v8a-signed-${{ env.SHORT_SHA }}
          path: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-arm64-v8a-release-*.apk
          if-no-files-found: error

      - name: Upload universal (signed)
        uses: actions/upload-artifact@v4
        with:
          name: mpvKt-universal-signed-${{ env.SHORT_SHA }}
          path: |
            app/build/outputs/apk/release/app-universal-release.apk
            app/build/outputs/apk/release/app-universal-release-*.apk
          if-no-files-found: error
