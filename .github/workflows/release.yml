name: Release

# Build APKs and publish a GitHub Release.
#
# Triggers:
#   - Push a tag matching v*  (e.g. git tag v0.1.7 && git push origin v0.1.7)
#   - Manual "Run workflow" with a version input
#
# Optional repository secrets for production signing:
#   SIGNING_KEYSTORE          base64-encoded .jks / .keystore
#   SIGNING_KEY_ALIAS
#   SIGNING_STORE_PASSWORD
#   KEY_PASSWORD
#
# Without those secrets the workflow still publishes installable APKs signed
# with the Android debug keystore (marked as debug-signed in the notes).

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag / version (e.g. v0.1.7-enhanced)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # normalize: ensure leading v
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v${TAG}"
          fi
          SAFE_TAG="${TAG//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "safe_tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "Resolved release tag: ${TAG}"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Detect signing secrets
        id: signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.SIGNING_KEYSTORE }}" && -n "${{ secrets.SIGNING_KEY_ALIAS }}" && -n "${{ secrets.SIGNING_STORE_PASSWORD }}" && -n "${{ secrets.KEY_PASSWORD }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — will produce production-signed release APKs."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets missing — will produce debug-signed installable APKs."
          fi

      - name: Build release APKs
        if: steps.signing.outputs.available == 'true'
        run: ./gradlew --no-daemon assembleRelease

      - name: Build preview APKs (debug-signed fallback)
        if: steps.signing.outputs.available != 'true'
        run: ./gradlew --no-daemon assemblePreview

      - name: Sign release APKs
        if: steps.signing.outputs.available == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.safe_tag }}"
          mkdir -p dist
          APIS=("universal" "arm64-v8a" "armeabi-v7a" "x86" "x86_64")

          if [[ "${{ steps.signing.outputs.available }}" == "true" ]]; then
            SRC_DIR="app/build/outputs/apk/release"
            # signed files from r0adkll are typically *-unsigned-signed.apk
            for abi in "${APIS[@]}"; do
              src=$(ls "${SRC_DIR}"/app-"${abi}"-release*signed*.apk 2>/dev/null | head -n1 || true)
              if [[ -z "${src}" ]]; then
                src=$(ls "${SRC_DIR}"/app-"${abi}"-release*.apk 2>/dev/null | head -n1 || true)
              fi
              if [[ -z "${src}" ]]; then
                echo "Missing APK for ${abi} under ${SRC_DIR}"
                ls -la "${SRC_DIR}" || true
                exit 1
              fi
              out="dist/mpvKt-${abi}-${TAG}.apk"
              cp "${src}" "${out}"
              echo "collected ${out} from ${src}"
            done
            SIGNING_NOTE="Signed with repository release keystore."
          else
            SRC_DIR="app/build/outputs/apk/preview"
            for abi in "${APIS[@]}"; do
              src=$(ls "${SRC_DIR}"/app-"${abi}"-preview*.apk 2>/dev/null | head -n1 || true)
              if [[ -z "${src}" ]]; then
                echo "Missing preview APK for ${abi} under ${SRC_DIR}"
                ls -la "${SRC_DIR}" || true
                exit 1
              fi
              out="dist/mpvKt-${abi}-${TAG}-debug-signed.apk"
              cp "${src}" "${out}"
              echo "collected ${out} from ${src}"
            done
            SIGNING_NOTE="⚠️ No SIGNING_* secrets configured. APKs are **debug-signed** (applicationId suffix \`.preview\`). Installable for testing; not a Play Store release."
          fi

          {
            echo "### Checksums"
            echo
            echo "| Variant | File | SHA-256 |"
            echo "| ------- | ---- | ------- |"
            for f in dist/*.apk; do
              base=$(basename "$f")
              # variant between mpvKt- and -v / -debug
              variant=$(echo "$base" | sed -E 's/^mpvKt-//; s/-v.*//; s/-debug-signed\.apk$//')
              sha=$(sha256sum "$f" | awk '{print $1}')
              echo "| ${variant} | \`${base}\` | \`${sha}\` |"
            done
          } > dist/CHECKSUMS.md

          echo "signing_note<<EOF" >> "$GITHUB_OUTPUT"
          echo "${SIGNING_NOTE}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          ls -lh dist/

      - name: Package source tarball
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.safe_tag }}"
          # lightweight source archive (exclude git / build caches)
          tar -czf "dist/mpvKt-source-${TAG}.tar.gz" \
            --exclude='.git' \
            --exclude='**/build' \
            --exclude='.gradle' \
            --exclude='**/.DS_Store' \
            -C .. "$(basename "$PWD")"
          ls -lh "dist/mpvKt-source-${TAG}.tar.gz"

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          cat > dist/RELEASE_BODY.md <<EOF
          ## mpvKt ${TAG}

          Enhanced Android media player based on [mpvKt](https://github.com/abdallahmehiz/mpvKt) / libmpv.

          ### Highlights
          - Local media + network streaming (HTTP / HLS / …)
          - Configurable demuxer cache size & readahead time
          - Configurable video / audio decoder threads
          - Streaming reconnect optimizations

          See \`ENHANCEMENTS.md\` in the source tarball for option mapping.

          ${{ steps.artifacts.outputs.signing_note }}

          $(cat dist/CHECKSUMS.md)

          ### Install tip
          Prefer **arm64-v8a** on modern phones; use **universal** if unsure.
          EOF
          echo "body_path=dist/RELEASE_BODY.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: mpvKt ${{ steps.meta.outputs.tag }}
          body_path: dist/RELEASE_BODY.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.tar.gz
            dist/CHECKSUMS.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: mpvKt-${{ steps.meta.outputs.safe_tag }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
