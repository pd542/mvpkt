name: Release

# Build signed APKs and publish a GitHub Release.
#
# Triggers:
#   - Push a tag matching v*  (e.g. git tag v0.1.7 && git push origin v0.1.7)
#   - Manual "Run workflow" with a version input
#
# Optional repository secrets for production signing:
#   SIGNING_KEYSTORE          base64-encoded .jks / .keystore
#   SIGNING_KEY_ALIAS
#   SIGNING_STORE_PASSWORD
#   KEY_PASSWORD
#
# Without those secrets, APKs are signed with the Android debug keystore
# (still fully installable on phones). Never publish unsigned APKs.

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag / version (e.g. v0.1.7-enhanced)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v${TAG}"
          fi
          SAFE_TAG="${TAG//\//-}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "safe_tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "Resolved release tag: ${TAG}"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Detect production signing secrets
        id: signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.SIGNING_KEYSTORE }}" && -n "${{ secrets.SIGNING_KEY_ALIAS }}" && -n "${{ secrets.SIGNING_STORE_PASSWORD }}" && -n "${{ secrets.KEY_PASSWORD }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Production signing secrets present."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No production secrets — APKs will use debug keystore (installable)."
          fi

      # release buildType is debug-signed by default in build.gradle.kts
      - name: Build release APKs (debug-signed by Gradle)
        run: ./gradlew --no-daemon assembleRelease

      - name: Re-sign with production keystore
        if: steps.signing.outputs.available == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Collect & verify signed artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.safe_tag }}"
          mkdir -p dist
          APIS=("universal" "arm64-v8a" "armeabi-v7a" "x86" "x86_64")
          SRC_DIR="app/build/outputs/apk/release"
          ls -la "${SRC_DIR}" || true

          if [[ "${{ steps.signing.outputs.available }}" == "true" ]]; then
            SIGNING_NOTE="Signed with repository production keystore."
            SUFFIX=""
          else
            SIGNING_NOTE="Signed with **Android debug keystore** (installable for sideload testing). Not a Play Store release key. To use your own key, add SIGNING_KEYSTORE / SIGNING_KEY_ALIAS / SIGNING_STORE_PASSWORD / KEY_PASSWORD secrets."
            SUFFIX="-debug-signed"
          fi

          for abi in "${APIS[@]}"; do
            # Prefer re-signed outputs from r0adkll, then normal signed release APKs.
            # Never pick *unsigned*.
            src=""
            for cand in \
              "${SRC_DIR}/app-${abi}-release-unsigned-signed.apk" \
              "${SRC_DIR}/app-${abi}-release-signed.apk" \
              "${SRC_DIR}/app-${abi}-release.apk"
            do
              if [[ -f "$cand" ]]; then src="$cand"; break; fi
            done
            # fallback: any matching apk that is not unsigned
            if [[ -z "$src" ]]; then
              src=$(ls "${SRC_DIR}"/app-"${abi}"-release*.apk 2>/dev/null | grep -v unsigned | head -n1 || true)
            fi
            if [[ -z "$src" || ! -f "$src" ]]; then
              echo "ERROR: missing signed APK for ${abi}"
              ls -la "${SRC_DIR}" || true
              exit 1
            fi
            if [[ "$src" == *unsigned* && "$src" != *signed* ]]; then
              echo "ERROR: refusing to ship unsigned APK: $src"
              exit 1
            fi
            out="dist/mpvKt-${abi}-${TAG}${SUFFIX}.apk"
            cp "$src" "$out"
            echo "collected $out from $src"

            # Verify APK has a signature (jarsigner or apksigner)
            if command -v apksigner >/dev/null 2>&1; then
              apksigner verify --print-certs "$out" >/tmp/verify.out 2>&1 || {
                echo "apksigner verify failed for $out"; cat /tmp/verify.out; exit 1;
              }
            else
              # Android SDK build-tools path
              ASIGNER=$(ls -d "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -n1 || true)
              if [[ -n "$ASIGNER" ]]; then
                "$ASIGNER" verify --print-certs "$out" >/tmp/verify.out 2>&1 || {
                  echo "apksigner verify failed for $out"; cat /tmp/verify.out; exit 1;
                }
              else
                jarsigner -verify -certs "$out" >/tmp/verify.out 2>&1 || {
                  echo "jarsigner verify failed for $out"; cat /tmp/verify.out; exit 1;
                }
              fi
            fi
            echo "verified signature: $out"
          done

          {
            echo "### Checksums"
            echo
            echo "| Variant | File | SHA-256 |"
            echo "| ------- | ---- | ------- |"
            for f in dist/*.apk; do
              base=$(basename "$f")
              variant=$(echo "$base" | sed -E 's/^mpvKt-//; s/-v.*//; s/-debug-signed\.apk$//')
              sha=$(sha256sum "$f" | awk '{print $1}')
              echo "| ${variant} | \`${base}\` | \`${sha}\` |"
            done
          } > dist/CHECKSUMS.md

          {
            echo "signing_note<<EOF"
            echo "${SIGNING_NOTE}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          ls -lh dist/

      - name: Package source tarball
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.safe_tag }}"
          tar -czf "dist/mpvKt-source-${TAG}.tar.gz" \
            --exclude='.git' \
            --exclude='**/build' \
            --exclude='.gradle' \
            --exclude='**/.DS_Store' \
            -C .. "$(basename "$PWD")"
          ls -lh "dist/mpvKt-source-${TAG}.tar.gz"

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          cat > dist/RELEASE_BODY.md <<EOF
          ## mpvKt ${TAG}

          Enhanced Android media player (local + network streaming) with configurable cache / threads.

          ### Install
          1. Download **arm64-v8a** APK on modern phones (or **universal** if unsure).
          2. Allow install from unknown sources.
          3. Open the APK — it is **signed** (debug key unless production secrets are configured).

          Do **not** install files named \`*-unsigned.apk\`.

          ${{ steps.artifacts.outputs.signing_note }}

          $(cat dist/CHECKSUMS.md)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: mpvKt ${{ steps.meta.outputs.tag }}
          body_path: dist/RELEASE_BODY.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.tar.gz
            dist/CHECKSUMS.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: mpvKt-${{ steps.meta.outputs.safe_tag }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
